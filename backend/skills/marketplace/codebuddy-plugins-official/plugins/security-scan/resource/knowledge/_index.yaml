    lines: 59
    inline_candidate: false

  - file: actuator-exposure.yaml
    load_strategy: conditional
    tech_stack: ["java-spring"]
    description: Actuator/管理端点暴露检测模式
    lines: 321
    inline_candidate: false  # 大文件，务必按需 Read

  - file: nodejs-web.yaml
    load_strategy: conditional
    tech_stack: ["nodejs-express", "nodejs-koa", "nodejs-nestjs"]
    description: Node.js Web 安全模式

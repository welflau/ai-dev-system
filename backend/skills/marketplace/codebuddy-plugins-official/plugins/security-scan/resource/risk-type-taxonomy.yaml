# ============================================================================
# 标准风险类型分类表 (Risk Type Taxonomy)
# ============================================================================
#
# 引用方：references/contracts/output-schemas.md、agents/vuln-scan.md（按需 Read）
#
# 此表并非穷举——agent 应基于实际代码发现风险，而非仅匹配此表中的类别。
# 对于未列出的风险类型，agent 应自行创建 slug（小写、连字符分隔）并附上中文分类注释。
# 不得因类型不在表中而忽略真实风险。

risk_types:

  injection:
    label: "注入类"
    types:
      - slug: "sql-injection"
        name: "SQL 注入"
        scenarios: "字符串拼接 SQL、未参数化查询、MyBatis ${}"
      - slug: "command-injection"
        name: "命令注入"
        scenarios: "os.system、exec、Runtime.exec、ProcessBuilder"
      - slug: "xss"
        name: "XSS"
        scenarios: "未转义的用户输入渲染到 HTML、innerHTML、v-html"
      - slug: "xxe"
        name: "XXE"
        scenarios: "XML 解析未禁用外部实体"
      - slug: "ssti"
        name: "模板注入"
        scenarios: "render_template_string、Velocity.evaluate、Freemarker"
      - slug: "csv-injection"
        name: "CSV 注入"
        scenarios: "导出 CSV 时未中和 =、+、-、@ 等公式前缀"
      - slug: "expression-injection"
        name: "表达式注入"
        scenarios: "SpEL、OGNL、EL 注入"
      - slug: "jndi-injection"
        name: "JNDI 注入"
        scenarios: "InitialContext.lookup、Log4Shell"
      - slug: "code-execution"
        name: "代码执行"
        scenarios: "eval()、exec()、new Function()"
      - slug: "nosql-injection"
        name: "NoSQL 注入"
        scenarios: "MongoDB $where、$regex、$ne 操作符注入，Mongoose 查询对象注入"
      - slug: "ldap-injection"
        name: "LDAP 注入"
        scenarios: "未转义的用户输入拼接 LDAP 查询过滤器"
      - slug: "crlf-injection"
        name: "HTTP 头注入"
        scenarios: "用户输入直接写入 HTTP 响应头，可插入 CRLF 实现头注入/响应拆分"
      - slug: "second-order-injection"
        name: "二阶注入"
        scenarios: "用户输入存入数据库/缓存后，另一个查询读出并用于 SQL/命令拼接"

  frontend_security:
    label: "前端安全类"
    types:
      - slug: "open-redirect"
        name: "开放重定向"
        scenarios: "未验证的 redirect URL、用户可控的 returnUrl/next 参数"
      - slug: "clickjacking"
        name: "点击劫持"
        scenarios: "缺少 X-Frame-Options、缺少 CSP frame-ancestors"
      - slug: "missing-security-headers"
        name: "安全头缺失"
        scenarios: "缺少 CSP、X-Content-Type-Options、Strict-Transport-Security"
      - slug: "prototype-pollution"
        name: "原型链污染"
        scenarios: "__proto__、constructor.prototype、Object.assign 深合并、lodash.merge 不安全使用"
      - slug: "postmessage-origin-bypass"
        name: "PostMessage 来源未验证"
        scenarios: "监听 message 事件未校验 event.origin、postMessage 目标 origin 为 *"
      - slug: "dom-clobbering"
        name: "DOM Clobbering"
        scenarios: "HTML 元素 name/id 覆盖全局 DOM 对象属性，劫持应用逻辑"
      - slug: "websocket-hijacking"
        name: "WebSocket 劫持"
        scenarios: "WebSocket 连接未验证 Origin 头、无认证机制、使用 ws:// 明文协议"
      - slug: "cors-misconfiguration"
        name: "CORS 配置缺陷"
        scenarios: "Origin 反射、endsWith 模糊匹配、Credentials+通配符"
      - slug: "client-side-bypass"
        name: "客户端验证绕过"
        scenarios: "仅前端权限控制、仅前端输入验证、前端价格计算"
      - slug: "insecure-localstorage"
        name: "LocalStorage 存储敏感数据"
        scenarios: "Token/密码等凭证存储在 LocalStorage/SessionStorage"

  auth_and_access:
    label: "认证与授权类"
    types:
      - slug: "access-control"
        name: "访问控制缺失"
        scenarios: "@PermitAll、缺少鉴权检查、CRUD 权限不一致"
      - slug: "idor"
        name: "越权访问"
        scenarios: "findById 无用户归属校验、水平/垂直越权"
      - slug: "auth-bypass"
        name: "认证绕过"
        scenarios: "可信来源伪造、认证逻辑短路、TOCTOU"
      - slug: "csrf"
        name: "CSRF"
        scenarios: "缺少 CSRF Token、状态变更接口无防护"
      - slug: "mass-assignment"
        name: "批量赋值"
        scenarios: "@ModelAttribute/@RequestBody 自动绑定到 Entity，未限制可绑定字段，攻击者可修改 role/admin/balance 等敏感字段"
      - slug: "session-fixation"
        name: "Session 固定"
        scenarios: "登录成功后未重新生成 Session ID，攻击者可预设 Session 劫持"
      - slug: "insecure-cookie"
        name: "Cookie 属性不安全"
        scenarios: "认证 Cookie 缺少 Secure/HttpOnly/SameSite 属性"
      - slug: "jwt-weak-key"
        name: "JWT 弱密钥"
        scenarios: "JWT 签名密钥硬编码、过短或为常见弱密钥"
      - slug: "jwt-algorithm-confusion"
        name: "JWT 算法混淆"
        scenarios: "允许 alg:none、同时接受 HS256 和 RS256 导致算法降级"
      - slug: "brute-force-unprotected"
        name: "暴力破解防护缺失"
        scenarios: "登录接口无失败锁定/速率限制/验证码"
      - slug: "credential-enumeration"
        name: "凭证枚举"
        scenarios: "登录/注册/重置密码接口通过不同响应泄露用户是否存在"

  data_and_config:
    label: "数据与配置类"
    types:
      - slug: "information-leak"
        name: "敏感信息泄露"
        scenarios: "日志或错误信息中包含敏感数据、堆栈跟踪泄露"
      - slug: "hardcoded-secret"
        name: "硬编码凭证"
        scenarios: "源码中的 Token、密码、密钥、AK/SK"
      - slug: "weak-crypto"
        name: "弱加密算法"
        scenarios: "使用 MD5、DES、SHA1、ECB 模式、硬编码密钥"
      - slug: "endpoint-exposure"
        name: "敏感端点暴露"
        scenarios: "生产环境暴露 Actuator/Swagger/GraphQL Playground"
      - slug: "insecure-config"
        name: "不安全配置"
        scenarios: "DEBUG=True、CORS *、autoindex on"
      - slug: "plaintext-password"
        name: "明文密码存储"
        scenarios: "密码未经哈希直接写入数据库"
      - slug: "weak-password-hash"
        name: "不安全密码哈希"
        scenarios: "使用 MD5/SHA1/SHA256 无盐哈希存储密码，未使用 bcrypt/argon2/scrypt"
      - slug: "predictable-reset-token"
        name: "密码重置令牌可预测"
        scenarios: "使用 Math.random/时间戳/截断UUID 生成重置令牌"
      - slug: "log-injection"
        name: "日志注入"
        scenarios: "用户输入未净化写入日志，可伪造日志条目（CRLF注入）"
      - slug: "sensitive-data-logging"
        name: "敏感数据日志泄露"
        scenarios: "密码、Token、身份证、银行卡等 PII 未脱敏写入日志"
      - slug: "missing-security-audit"
        name: "安全事件审计缺失"
        scenarios: "认证失败/权限变更/数据导出等关键安全事件缺少审计日志"

  server_request_and_data:
    label: "服务端请求与数据处理类"
    types:
      - slug: "ssrf"
        name: "SSRF"
        scenarios: "未验证的外部 URL 请求、IMDS 访问"
      - slug: "path-traversal"
        name: "路径遍历"
        scenarios: "未验证的文件路径拼接、文件上传路径可控"
      - slug: "insecure-deserialization"
        name: "不安全反序列化"
        scenarios: "ObjectInputStream、Fastjson、pickle、yaml.load"
      - slug: "file-upload"
        name: "不安全文件上传"
        scenarios: "文件类型/大小未校验、上传路径可控"
      - slug: "denial-of-service"
        name: "拒绝服务"
        scenarios: "正则回溯、图片放大、资源消耗型请求"
      - slug: "redos"
        name: "ReDoS"
        scenarios: "正则表达式包含灾难性回溯模式（嵌套量词/重叠字符类），用户可控正则注入"
      - slug: "xml-bomb"
        name: "XML 解析炸弹"
        scenarios: "XML 实体递归展开（Billion Laughs）、未禁用 DOCTYPE"
      - slug: "zip-bomb"
        name: "Zip 炸弹"
        scenarios: "解压缩未限制展开后大小/条目数量"
      - slug: "resource-exhaustion"
        name: "资源耗尽"
        scenarios: "无限制文件上传、无分页全量查询、外部请求无超时、JSON 深度嵌套"

  dependency:
    label: "依赖与供应链类"
    types:
      - slug: "vulnerable-dependency"
        name: "高危组件漏洞"
        scenarios: "第三方组件中存在已知 CVE"
      - slug: "dependency-confusion"
        name: "依赖混淆"
        scenarios: "私有包名被公共仓库抢注、混合 registry 配置导致安装劫持"
      - slug: "malicious-package"
        name: "恶意包/投毒"
        scenarios: "已知投毒包版本、install hook 恶意执行、数据外泄行为"
      - slug: "typosquatting"
        name: "拼写抢注包"
        scenarios: "依赖名与热门包仅差 1-2 个字符，疑似 typosquatting"
      - slug: "missing-lockfile"
        name: "依赖锁定缺失"
        scenarios: "存在依赖声明但缺少 lock 文件，构建不可重现"
      - slug: "insecure-dependency-source"
        name: "不安全依赖源"
        scenarios: "通过 HTTP 获取依赖、Git 依赖使用分支而非固定 commit、URL 直接安装"

  business_logic:
    label: "业务逻辑类"
    types:
      - slug: "race-condition"
        name: "竞态条件"
        scenarios: "双重支付、超卖、TOCTOU"
      - slug: "business-logic"
        name: "业务逻辑缺陷"
        scenarios: "流程绕过、非法状态转换、负数金额"
      - slug: "payment-logic"
        name: "支付逻辑缺陷"
        scenarios: "价格篡改、优惠券叠加、退款滥用"
      - slug: "potential-0day"
        name: "潜在 0day"
        scenarios: "自定义序列化、自定义加密、复杂状态机"
      - slug: "missing-idempotency"
        name: "幂等性缺失"
        scenarios: "关键操作（支付/转账/发放）无幂等控制，重复请求导致重复执行"
      - slug: "data-isolation-failure"
        name: "数据隔离失效"
        scenarios: "多租户查询未携带租户/用户条件，可越权访问其他租户数据"
      - slug: "missing-audit-log"
        name: "审计日志缺失"
        scenarios: "敏感操作（删除/权限变更/数据导出）无审计记录"
      - slug: "callback-trust"
        name: "回调信任缺失"
        scenarios: "支付回调/WebHook 缺少签名验证，可伪造通知"
      - slug: "transaction-integrity"
        name: "事务完整性缺陷"
        scenarios: "多步写操作未在事务内，部分失败无补偿导致数据不一致"
      - slug: "input-boundary"
        name: "输入边界缺失"
        scenarios: "数值参数无范围校验（0/负数/极大值），字符串参数无长度限制"
      - slug: "rate-limit-missing"
        name: "频率限制缺失"
        scenarios: "批量/导出/注册/验证码接口无速率限制，可被滥用"
      - slug: "state-machine-violation"
        name: "状态机违规"
        scenarios: "已完成订单可回退到待支付，状态更新无前置状态校验"

  cloud_security:
    label: "云安全类"
    types:
      - slug: "cloud-imds"
        name: "IMDS 无限制访问"
        scenarios: "SSRF 可达 169.254.169.254 / metadata.tencentyun.com / 100.100.100.200"
      - slug: "iam-overprivilege"
        name: "IAM/CAM 过度授权"
        scenarios: "Action: \"*\"、Resource: \"*\"、CAM 高危操作未限制（PassRole/CreatePolicy）"
      - slug: "public-bucket"
        name: "公开存储桶"
        scenarios: "COS/S3/OSS ACL/Policy 允许公开访问、预签名 URL 有效期过长"
      - slug: "security-group-open"
        name: "安全组过度开放"
        scenarios: "CVM 安全组对 0.0.0.0/0 开放高危端口（SSH/RDP/DB）"
      - slug: "serverless-no-auth"
        name: "云函数无认证"
        scenarios: "SCF 云函数 API 网关触发器 authType=NONE"
      - slug: "cloud-db-exposed"
        name: "云数据库公网暴露"
        scenarios: "CDB/RDS 开启公网访问、连接串硬编码"

# ============================================================================
# 扩展规则
# ============================================================================
# 发现新类型时，agent 自行创建 {中文简称} + {slug} 并写入对应
# finding-{slug}.json。不得因类型未预定义而丢弃真实风险。
# 同一 finding-{slug}.json 中的所有条目 RiskType 必须一致。

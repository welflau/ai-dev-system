name: 标准软件开发流程
version: '2.0'
description: 需求拆单 → 架构设计 → 开发自测 → 产品验收 → 测试 → 部署
global:
  max_retries: 5
  zombie_timeout_seconds: 120
stages:
- id: architecture
  name: 架构设计
  agent: ArchitectAgent
  action: design_architecture
  trigger_on: pending
  success_status: architecture_done
  description: 分析需求，设计增量技术架构方案
  config:
    read_existing_code: true
    max_code_chars: 1500
    max_tokens: 2000
- id: development
  name: 代码开发
  agent: DevAgent
  action: develop
  trigger_on: architecture_done
  success_status: development_done
  description: 根据架构设计编写代码，含自测
  config:
    read_existing_code: true
    max_code_chars: 2000
    max_tokens: 16000
    self_test: true
    generate_dev_notes: true
- id: acceptance
  name: 产品验收
  agent: ProductAgent
  action: acceptance_review
  trigger_on: development_done
  success_status: acceptance_passed
  reject_status: acceptance_rejected
  reject_goto: rework
  description: 产品经理验收代码是否符合需求
  config:
    review_code_content: true
    max_code_chars: 5000
    check_http: false
    pass_score: 6
    check_items:
    - 入口文件（index.html/main.py）是否存在且可运行
    - 代码功能是否覆盖需求描述中的所有要点
    - 代码风格和命名是否规范
    - 是否有明显的 bug 或安全问题
- id: testing
  name: 质量测试
  agent: TestAgent
  action: run_tests
  trigger_on: acceptance_passed
  success_status: testing_done
  reject_status: testing_failed
  reject_goto: fix_issues
  pass_threshold: 60
  description: 5层测试：静态分析+代码审查+功能测试+用例生成+执行
  config:
    static_analysis: true
    code_review: true
    functional_test: true
    generate_test_cases: true
    run_pytest: true
- id: rework
  name: 返工修复
  agent: DevAgent
  action: rework
  trigger_on: acceptance_rejected
  success_status: development_done
  description: 验收不通过，根据反馈返工修改
  config:
    read_existing_code: true
    max_tokens: 16000
- id: fix_issues
  name: 问题修复
  agent: DevAgent
  action: fix_issues
  trigger_on: testing_failed
  success_status: development_done
  description: 测试不通过，根据测试报告修复问题
  config:
    read_existing_code: true
    max_tokens: 16000
pipeline_view:
  stages:
  - key: requirement_analysis
    name: 需求分析
    icon: 📋
    synthetic: requirement_status
    description: 基于需求 status (submitted/analyzing/decomposed) 判定，ProductAgent 拆单
  - key: architecture
    name: 架构设计
    icon: 🏗️
    sop_stages:
    - architecture
    running_statuses:
    - architecture_in_progress
    description: ArchitectAgent 设计增量技术方案
  - key: development
    name: 开发实现
    icon: 💻
    sop_stages:
    - development
    - acceptance
    - rework
    running_statuses:
    - development_in_progress
    - acceptance_rejected
    description: DevAgent 开发 + ProductAgent 验收 + 必要时返工
  - key: testing
    name: 测试验证
    icon: 🧪
    sop_stages:
    - testing
    - fix_issues
    running_statuses:
    - testing_in_progress
    - acceptance_passed
    - testing_failed
    description: TestAgent 多层测试 + 失败时修复
  - key: merge_develop
    name: 合入Develop
    icon: 🔀
    synthetic: merge
    description: 所有工单 testing_done 后 Orchestrator 合并 feat 分支到 develop

# AI Dev System — 标准开发流程 SOP
# 修改此文件即可调整工单流转逻辑和 Action 行为，无需改代码
# 重启后端或调用 POST /api/sop/reload 生效

name: "标准软件开发流程"
version: "2.0"
description: "需求拆单 → 架构设计 → 开发自测 → 产品验收 → 测试 → 部署"

# 全局配置
global:
  max_retries: 5              # 最大打回重试次数
  zombie_timeout_seconds: 120 # 僵尸工单超时（秒）

stages:
  - id: architecture
    name: "架构设计"
    agent: ArchitectAgent
    action: design_architecture
    trigger_on: pending
    success_status: architecture_done
    description: "分析需求，设计增量技术架构方案"
    config:
      read_existing_code: true      # 读取已有代码
      max_code_chars: 1500          # 传给 LLM 的代码量
      max_tokens: 2000

  - id: development
    name: "代码开发"
    agent: DevAgent
    action: develop
    trigger_on: architecture_done
    success_status: development_done
    description: "根据架构设计编写代码，含自测"
    config:
      read_existing_code: true
      max_code_chars: 2000
      max_tokens: 16000
      self_test: true               # 开发完自动自测
      generate_dev_notes: true      # 生成开发笔记

  - id: acceptance
    name: "产品验收"
    agent: ProductAgent
    action: acceptance_review
    trigger_on: development_done
    success_status: acceptance_passed
    reject_status: acceptance_rejected
    reject_goto: rework
    description: "产品经理验收代码是否符合需求"
    config:
      review_code_content: true     # 读取实际代码内容（不只看文件名）
      max_code_chars: 3000          # 传给 LLM 审查的代码量
      check_http: false             # 是否启动 HTTP 验证可访问性
      pass_score: 6                 # 评分 >= 此值才通过
      check_items:                  # 验收检查清单
        - "入口文件（index.html/main.py）是否存在且可运行"
        - "代码功能是否覆盖需求描述中的所有要点"
        - "代码风格和命名是否规范"
        - "是否有明显的 bug 或安全问题"

  - id: testing
    name: "质量测试"
    agent: TestAgent
    action: run_tests
    trigger_on: acceptance_passed
    success_status: testing_done
    reject_status: testing_failed
    reject_goto: fix_issues
    pass_threshold: 60
    description: "5层测试：静态分析+代码审查+功能测试+用例生成+执行"
    config:
      static_analysis: true
      code_review: true
      functional_test: true         # HTTP 功能测试（前端项目）
      generate_test_cases: true     # LLM 生成测试用例
      run_pytest: true

  # --- 打回处理阶段 ---

  - id: rework
    name: "返工修复"
    agent: DevAgent
    action: rework
    trigger_on: acceptance_rejected
    success_status: development_done
    description: "验收不通过，根据反馈返工修改"
    config:
      read_existing_code: true
      max_tokens: 16000

  - id: fix_issues
    name: "问题修复"
    agent: DevAgent
    action: fix_issues
    trigger_on: testing_failed
    success_status: development_done
    description: "测试不通过，根据测试报告修复问题"
    config:
      read_existing_code: true
      max_tokens: 16000

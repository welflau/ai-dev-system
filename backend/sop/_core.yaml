# SOP Core —— 所有项目通用的基础阶段（v0.17 trait-first 骨架）
#
# 配合 backend/sop/fragments/*.yaml 做动态组合。
# fragments 按 required_traits / required_ticket_type 过滤后插入到 core 对应位置。
# compose 后的 SOP 等价于 default_sop.yaml 的格式，orchestrator 无感消费。

name: 通用开发流程（trait-first 骨架）
version: "3.0"
description: 架构 → 开发 → 代码审查 → 产品验收 → 部署

global:
  max_retries: 5
  zombie_timeout_seconds: 120

# 基础阶段。fragments 可通过 insert_after / insert_before 插入新阶段在这些之间。
base_stages:
  - id: architecture
    name: 架构设计
    agent: ArchitectAgent
    action: design_architecture
    trigger_on: pending
    success_status: architecture_done
    description: 分析需求，设计增量技术架构方案
    config:
      read_existing_code: true
      max_code_chars: 1500
      max_tokens: 2000
      self_consistency: false
      consistency_n: 3
      consistency_temperature: 0.8

  - id: development
    name: 代码开发
    agent: DevAgent
    action: develop
    trigger_on: architecture_done
    success_status: development_done
    description: 根据架构设计编写代码，含自测
    config:
      read_existing_code: true
      max_code_chars: 2000
      max_tokens: 16000
      self_test: true
      verify_disk_files: true
      generate_dev_notes: true

  - id: code_review
    name: 代码审查
    agent: ReviewAgent
    action: code_review
    trigger_on: development_done
    success_status: review_passed
    description: ReviewAgent 读取实际代码做审查
    config:
      max_code_chars: 12000
      per_file_code_chars: 6000
      pass_score: 7
      block_on_low_score: false

  - id: acceptance
    name: 产品验收
    agent: ProductAgent
    action: acceptance_review
    trigger_on: review_passed
    success_status: acceptance_passed
    reject_status: acceptance_rejected
    reject_goto: rework
    description: 产品经理验收代码是否符合需求
    config:
      max_rework_count: 5
      force_pass_after_max_rework: true

  - id: deploy
    name: 部署
    agent: DeployAgent
    action: deploy
    trigger_on: acceptance_passed
    success_status: deployed
    description: 部署到测试环境
    config:
      target_env: test

  # 返工阶段：acceptance_rejected 或 testing_failed 时回到 DevAgent 修复
  # orchestrator 通过 reject_goto 查找此 stage，需要它存在（否则 pipeline_view 会 warn）
  - id: rework
    name: 返工修复
    agent: DevAgent
    action: fix_issues
    trigger_on: acceptance_rejected
    success_status: development_done
    description: 验收/测试未通过，根据反馈修复问题后重新进入 code_review
    config:
      read_existing_code: true
      max_tokens: 16000
      enable_reflection: true
      reflection_max_prev: 3

# Pipeline UI 展示配置（蓝盾风格的 N 阶段视图）。
# compose_sop 会把 fragments 里的 pipeline_view_contrib 合并到这里（Phase C.3）。
# 基础布局：需求分析（合成） → 架构设计 → 开发实现 → 合入Develop（合成）。
# fragments（如 smoke_test / play_test / engine_compile）会动态往"测试验证"组插，
# 没有任何 fragment 时该组不出现，web 项目维持 4 格视图。
pipeline_view:
  stages:
    - key: requirement_analysis
      name: 需求分析
      icon: 📋
      synthetic: requirement_status
      description: 基于需求 status (submitted/analyzing/decomposed) 判定，ProductAgent 拆单
    - key: architecture
      name: 架构设计
      icon: 🏗️
      sop_stages:
        - architecture
      running_statuses:
        - architecture_in_progress
      description: ArchitectAgent 设计增量技术方案
    - key: development
      name: 开发实现
      icon: 💻
      sop_stages:
        - development
        - code_review
        - acceptance
        - rework
      running_statuses:
        - development_in_progress
        - review_in_progress
        - acceptance_rejected
      description: DevAgent 开发 + ReviewAgent 代码审查 + ProductAgent 验收 + 必要时返工
    - key: merge_develop
      name: 合入Develop
      icon: 🔀
      synthetic: merge
      description: 所有工单完成后 Orchestrator 合并 feat 分支到 develop

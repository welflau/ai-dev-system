<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 自动开发系统</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <!-- ==================== 顶栏 ==================== -->
    <header class="top-bar">
        <div class="top-bar-left">
            <div class="logo">🤖 AI Dev System</div>
            <nav class="breadcrumb" id="breadcrumb">
                <a href="#" onclick="showProjectList()">项目列表</a>
            </nav>
        </div>
        <div class="top-bar-right">
            <div class="llm-status" id="llmStatus" onclick="showLLMConfigModal()" style="cursor:pointer;" title="点击配置 LLM">
                <span class="dot"></span>
                <span class="text">检测中...</span>
            </div>
        </div>
    </header>

    <!-- ==================== 主内容 ==================== -->
    <main class="main-container">

        <!-- 项目列表页 -->
        <section id="projectListPage" class="page active">
            <div class="page-header">
                <h1>我的项目</h1>
                <button class="btn btn-primary" onclick="showCreateProjectModal()">+ 新建项目</button>
            </div>
            <div class="project-grid" id="projectGrid"></div>
        </section>

        <!-- 项目详情页 -->
        <section id="projectPage" class="page">
            <div class="project-layout">
                <!-- 侧栏 -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h3 id="sidebarProjectName"></h3>
                    </div>
                    <nav class="sidebar-nav">
                        <a class="nav-item active" data-tab="board" onclick="switchTab('board')">
                            📌 工单看板
                        </a>
                        <a class="nav-item" data-tab="requirements" onclick="switchTab('requirements')">
                            📋 需求列表
                        </a>
                        <a class="nav-item" data-tab="stats" onclick="switchTab('stats')">
                            📊 统计面板
                        </a>
                        <a class="nav-item" data-tab="logs" onclick="switchTab('logs')">
                            📝 操作日志
                        </a>
                    </nav>
                    <div class="sidebar-footer">
                        <button class="btn btn-accent btn-block" onclick="showCreateRequirementModal()">
                            + 提交需求
                        </button>
                    </div>
                </aside>

                <!-- 主内容区 -->
                <div class="content-area">

                    <!-- Tab: 工单看板 -->
                    <div id="tab-board" class="tab-content active">
                        <div class="board-header">
                            <h2>工单看板</h2>
                            <div class="board-filters">
                                <select id="filterRequirement" onchange="refreshBoard()">
                                    <option value="">全部需求</option>
                                </select>
                                <select id="filterModule" onchange="refreshBoard()">
                                    <option value="">全部模块</option>
                                    <option value="frontend">前端</option>
                                    <option value="backend">后端</option>
                                    <option value="database">数据库</option>
                                    <option value="api">API</option>
                                    <option value="testing">测试</option>
                                    <option value="deploy">部署</option>
                                </select>
                            </div>
                        </div>
                        <div class="board" id="kanbanBoard">
                            <div class="board-column" data-status="pending">
                                <div class="column-header">
                                    <span class="column-title">待启动</span>
                                    <span class="column-count" id="count-pending">0</span>
                                </div>
                                <div class="column-body" id="col-pending"></div>
                            </div>
                            <div class="board-column" data-status="architecture">
                                <div class="column-header">
                                    <span class="column-title">架构中</span>
                                    <span class="column-count" id="count-architecture">0</span>
                                </div>
                                <div class="column-body" id="col-architecture"></div>
                            </div>
                            <div class="board-column" data-status="development">
                                <div class="column-header">
                                    <span class="column-title">开发中</span>
                                    <span class="column-count" id="count-development">0</span>
                                </div>
                                <div class="column-body" id="col-development"></div>
                            </div>
                            <div class="board-column" data-status="testing">
                                <div class="column-header">
                                    <span class="column-title">测试中</span>
                                    <span class="column-count" id="count-testing">0</span>
                                </div>
                                <div class="column-body" id="col-testing"></div>
                            </div>
                            <div class="board-column" data-status="deployed">
                                <div class="column-header">
                                    <span class="column-title">已部署</span>
                                    <span class="column-count" id="count-deployed">0</span>
                                </div>
                                <div class="column-body" id="col-deployed"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Tab: 需求列表 -->
                    <div id="tab-requirements" class="tab-content">
                        <div class="page-header">
                            <h2>需求列表</h2>
                            <button class="btn btn-primary" onclick="showCreateRequirementModal()">+ 提交需求</button>
                        </div>
                        <div class="requirement-list" id="requirementList"></div>
                    </div>

                    <!-- Tab: Pipeline -->
                    <div id="tab-pipeline" class="tab-content">
                        <div class="pipeline-page">
                            <!-- 返回栏 + 标题 -->
                            <div class="pipeline-back-bar">
                                <button class="btn btn-sm" onclick="switchTab('requirements')">← 返回需求列表</button>
                                <h2 id="pipelineReqTitle">Pipeline</h2>
                                <span class="req-status" id="pipelineReqStatus"></span>
                            </div>
                            <!-- 执行信息栏 -->
                            <div class="pipeline-info-bar" id="pipelineInfoBar">
                                <div class="pipeline-exec-status" id="pipelineExecStatus">
                                    <span class="exec-badge pending">等待中</span>
                                </div>
                                <div class="pipeline-timeline">
                                    <div class="timeline-node">
                                        <div class="timeline-dot"></div>
                                        <div class="timeline-label">触发时间</div>
                                        <div class="timeline-value" id="plTriggerTime">-</div>
                                    </div>
                                    <div class="timeline-line"></div>
                                    <div class="timeline-node">
                                        <div class="timeline-dot"></div>
                                        <div class="timeline-label">开始时间</div>
                                        <div class="timeline-value" id="plStartTime">-</div>
                                    </div>
                                    <div class="timeline-line"></div>
                                    <div class="timeline-node">
                                        <div class="timeline-dot"></div>
                                        <div class="timeline-label">结束时间</div>
                                        <div class="timeline-value" id="plEndTime">-</div>
                                    </div>
                                </div>
                                <div class="pipeline-duration" id="pipelineDuration">
                                    总耗时: <strong>-</strong>
                                </div>
                            </div>
                            <!-- 控制栏 -->
                            <div class="pipeline-controls">
                                <label class="pl-checkbox"><input type="checkbox" id="plExpandJobs" checked onchange="toggleExpandJobs()"> 展开 Job</label>
                                <a class="pl-link" onclick="scrollToPipelineLogs()">📋 查看日志</a>
                            </div>
                            <!-- Stage 主体（横向流水线）-->
                            <div class="pipeline-body" id="pipelineBody">
                                <div class="pipeline-stages-row" id="pipelineStagesRow">
                                    <div class="empty-state"><div class="emoji">⏳</div><p>加载中...</p></div>
                                </div>
                            </div>
                            <!-- 右侧 Job 日志面板 -->
                            <div class="pipeline-job-log-panel" id="pipelineJobLogPanel" style="display:none;">
                                <div class="job-log-header">
                                    <div class="job-log-title">
                                        <span class="job-log-icon" id="jobLogIcon">✓</span>
                                        <span id="jobLogTitle">Job</span>
                                    </div>
                                    <div class="job-log-tabs">
                                        <button class="job-log-tab active" onclick="switchJobLogTab('log')">📋 日志</button>
                                        <button class="job-log-tab" onclick="switchJobLogTab('ai')">🤖 AI 对话</button>
                                        <button class="job-log-tab" onclick="switchJobLogTab('artifacts')">📦 产出文件</button>
                                    </div>
                                    <button class="btn-icon" onclick="closeJobLogPanel()">&times;</button>
                                </div>
                                <div class="job-log-body" id="jobLogBody">
                                    <div class="job-log-entries" id="jobLogEntries">
                                        <div class="log-panel-empty">选择一个 Job 查看日志</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Tab: 统计面板 -->
                    <div id="tab-stats" class="tab-content">
                        <h2>项目统计</h2>
                        <div class="stats-grid" id="statsGrid"></div>
                    </div>

                    <!-- Tab: 操作日志 -->
                    <div id="tab-logs" class="tab-content">
                        <h2>操作日志</h2>
                        <div class="log-timeline" id="logTimeline"></div>
                    </div>
                </div>

                <!-- ==================== 底部日志面板 ==================== -->
                <div class="log-panel" id="logPanel">
                    <div class="log-panel-resize" id="logPanelResize"></div>
                    <div class="log-panel-header" id="logPanelHeader">
                        <div class="log-panel-title">
                            <span class="log-panel-icon">📋</span>
                            <span>实时日志</span>
                            <span class="log-panel-badge" id="logPanelBadge" style="display:none;">0</span>
                        </div>
                        <div class="log-panel-actions">
                            <select id="logLevelFilter" onchange="filterLogPanel()" title="日志级别">
                                <option value="">全部级别</option>
                                <option value="info">INFO</option>
                                <option value="warn">WARN</option>
                                <option value="error">ERROR</option>
                            </select>
                            <select id="logAgentFilter" onchange="filterLogPanel()" title="Agent 筛选">
                                <option value="">全部 Agent</option>
                                <option value="ProductAgent">ProductAgent</option>
                                <option value="ArchitectAgent">ArchitectAgent</option>
                                <option value="DevAgent">DevAgent</option>
                                <option value="TestAgent">TestAgent</option>
                                <option value="ReviewAgent">ReviewAgent</option>
                                <option value="DeployAgent">DeployAgent</option>
                                <option value="Orchestrator">Orchestrator</option>
                            </select>
                            <button class="btn-icon log-panel-btn" onclick="clearLogPanel()" title="清空日志">🗑️</button>
                            <button class="btn-icon log-panel-btn" onclick="toggleAutoScroll()" id="autoScrollBtn" title="自动滚动">⬇️</button>
                            <button class="btn-icon log-panel-btn" onclick="toggleLogPanel()" id="logPanelToggle" title="展开/收起">▼</button>
                        </div>
                    </div>
                    <div class="log-panel-body" id="logPanelBody">
                        <div class="log-panel-entries" id="logPanelEntries">
                            <div class="log-panel-empty">等待日志...</div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- ==================== 工单详情抽屉 ==================== -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <aside class="drawer" id="ticketDrawer">
        <div class="drawer-header">
            <div class="drawer-title" id="drawerTitle"></div>
            <button class="btn-icon" onclick="closeDrawer()">&times;</button>
        </div>
        <div class="drawer-body" id="drawerBody"></div>
    </aside>

    <!-- ==================== 模态框：新建项目 ==================== -->
    <div class="modal-overlay" id="createProjectModal">
        <div class="modal">
            <div class="modal-header">
                <h3>新建项目</h3>
                <button class="btn-icon" onclick="closeModal('createProjectModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>项目名称 <span class="required">*</span></label>
                    <input type="text" id="projectName" placeholder="输入项目名称">
                </div>
                <div class="form-group">
                    <label>项目描述</label>
                    <textarea id="projectDescription" placeholder="描述项目目标和背景" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>技术栈</label>
                    <input type="text" id="projectTechStack" placeholder="如 Python, FastAPI, React...">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('createProjectModal')">取消</button>
                <button class="btn btn-primary" onclick="createProject()">创建</button>
            </div>
        </div>
    </div>

    <!-- ==================== 模态框：提交需求 ==================== -->
    <div class="modal-overlay" id="createRequirementModal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3>提交需求</h3>
                <button class="btn-icon" onclick="closeModal('createRequirementModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>需求标题 <span class="required">*</span></label>
                    <input type="text" id="reqTitle" placeholder="简洁描述你想要实现的功能">
                </div>
                <div class="form-group">
                    <label>需求描述 <span class="required">*</span></label>
                    <textarea id="reqDescription" placeholder="详细描述功能需求、用户场景、预期效果。描述越清晰，AI 拆单越准确。" rows="6"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>优先级</label>
                        <select id="reqPriority">
                            <option value="low">低</option>
                            <option value="medium" selected>中</option>
                            <option value="high">高</option>
                            <option value="critical">紧急</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>模块</label>
                        <input type="text" id="reqModule" placeholder="如：用户模块、支付模块">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('createRequirementModal')">取消</button>
                <button class="btn btn-primary" onclick="submitRequirement()">提交并拆单</button>
            </div>
        </div>
    </div>

    <!-- ==================== 模态框：LLM 配置 ==================== -->
    <div class="modal-overlay" id="llmConfigModal">
        <div class="modal">
            <div class="modal-header">
                <h3>⚙️ LLM 配置</h3>
                <button class="btn-icon" onclick="closeModal('llmConfigModal')">&times;</button>
            </div>
            <div class="modal-body">
                <p style="font-size:12px; color:var(--text-muted); margin-bottom:16px;">
                    配置 OpenAI 兼容的 LLM API，用于智能需求拆分、代码生成等 AI 功能。不配置则使用规则引擎降级。
                </p>
                <div class="form-group">
                    <label>API Base URL <span class="required">*</span></label>
                    <input type="text" id="llmBaseUrl" placeholder="https://api.openai.com/v1">
                </div>
                <div class="form-group">
                    <label>API Key <span class="required">*</span></label>
                    <div style="position:relative;">
                        <input type="password" id="llmApiKey" placeholder="sk-..." style="padding-right:40px;">
                        <button class="btn-icon" onclick="togglePasswordVisibility('llmApiKey', this)" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); font-size:14px;" title="显示/隐藏">👁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>模型名称</label>
                    <input type="text" id="llmModel" placeholder="gpt-4">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>超时时间（秒）</label>
                        <input type="number" id="llmTimeout" placeholder="60" min="10" max="300" value="60">
                    </div>
                    <div class="form-group">
                        <label>最大重试次数</label>
                        <input type="number" id="llmMaxRetries" placeholder="3" min="0" max="10" value="3">
                    </div>
                </div>
                <div id="llmTestResult" style="display:none; padding:10px; border-radius:var(--radius-sm); font-size:13px; margin-top:8px;"></div>
            </div>
            <div class="modal-footer" style="justify-content:space-between;">
                <button class="btn" onclick="testLLMConnection()" id="llmTestBtn">🔗 测试连接</button>
                <div>
                    <button class="btn" onclick="closeModal('llmConfigModal')">取消</button>
                    <button class="btn btn-primary" onclick="saveLLMConfig()">保存配置</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== Toast 通知 ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/app.js"></script>
</body>
</html>
